<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fakezalem | Wilton Lucas</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
}

/* LOADING */
#loading {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 999;
}

/* BACKGROUND DINÂMICO */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    filter: blur(8px) brightness(0.5);
    transition: opacity 1s ease;
}

/* overlay escuro */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

/* TEXTO */
.loading-text {
    position: absolute;
    bottom: 50px;
    width: 100%;
    text-align: center;
    color: #f8b4ff;
    font-size: 22px;
    letter-spacing: 3px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 0.3; }
    50% { opacity: 1; }
    100% { opacity: 0.3; }
}

/* CONTEÚDO */
#content {
    display: none;
    text-align: center;
    color: #f8b4ff;
    margin-top: 100px;
    background: url("https://wallpapercave.com/wp/wp5128415.jpg") no-repeat center/cover;
    height: 100vh;
}

.box {
    background: rgba(0,0,0,0.7);
    padding: 30px;
    border-radius: 15px;
    display: inline-block;
    box-shadow: 0 0 30px #f8b4ff55;
    animation: fadeIn 2s ease;
    margin-top: 100px;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px);}
    to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div id="loading">
    <div class="bg" id="bg1"></div>
    <div class="bg" id="bg2" style="opacity:0;"></div>
    <div class="overlay"></div>
    <div class="loading-text">LOADING FAKEZALEM...</div>
</div>

<div id="content">
    <div class="box">
        <h1>Fakezalem</h1>
        <p>Wilton Lucas</p>
        <p>💻 Dev | 🎮 Minecraft Modder</p>
    </div>
</div>

<script>
const images = [
    "https://picsum.photos/1920/1080?random=1",
    "https://picsum.photos/1920/1080?random=2",
    "https://picsum.photos/1920/1080?random=3",
    "https://picsum.photos/1920/1080?random=4",
    "https://picsum.photos/1920/1080?random=5"
];

let current = 0;

function changeBackground() {
    const next = (current + 1) % 2;

    const bgCurrent = document.getElementById("bg" + (current + 1));
    const bgNext = document.getElementById("bg" + (next + 1));

    bgNext.style.backgroundImage = `url(${images[Math.floor(Math.random() * images.length)]})`;
    bgNext.style.opacity = 1;
    bgCurrent.style.opacity = 0;

    current = next;
}

// primeira imagem
changeBackground();

// troca a cada 1.5s
let interval = setInterval(changeBackground, 1500);

// termina loading
setTimeout(() => {
    clearInterval(interval);
    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";
}, 5000);
</script>

</body>
</html>
